syntax = "proto3";

package protomcp.testdata.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/any.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/gdsoumya/protomcp/internal/gen/schema/testdata;testdatav1";

// Scalars exercises every scalar Kind and the int64/uint64 → string
// protojson rule plus the bytes base64 rendering.
message Scalars {
  string   s         = 1;
  bool     b         = 2;
  int32    i32       = 3;
  int64    i64       = 4;
  uint32   u32       = 5;
  uint64   u64       = 6;
  sint32   si32      = 7;
  sint64   si64      = 8;
  fixed32  fx32      = 9;
  fixed64  fx64      = 10;
  sfixed32 sfx32     = 11;
  sfixed64 sfx64     = 12;
  float    f         = 13;
  double   d         = 14;
  bytes    raw       = 15;
}

// Status enum, including the conventional UNSPECIFIED zero value.
enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_OK = 1;
  STATUS_ERROR = 2;
}

// Enums exercises plain enum + every buf.validate enum constraint variant.
message Enums {
  Status plain = 1;

  Status defined_only = 2 [(buf.validate.field).enum.defined_only = true];

  Status only_in = 3 [(buf.validate.field).enum = {
    in: [1, 2]
  }];

  Status constant = 4 [(buf.validate.field).enum.const = 1];

  Status not_in = 5 [(buf.validate.field).enum = {
    not_in: [0]
  }];
}

// Required tests both the AIP-203 REQUIRED annotation and buf.validate.required.
// OUTPUT_ONLY must be stripped from input schemas but present on output schemas.
message Required {
  string api_required          = 1 [(google.api.field_behavior) = REQUIRED];
  string protovalidate_required = 2 [(buf.validate.field).required = true];
  string optional_field         = 3;
  string server_computed        = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
  // A field marked both REQUIRED and OUTPUT_ONLY is silly but legal;
  // OUTPUT_ONLY wins for input schemas (the server fills it in).
  string both                   = 5 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];
}

// Strings exercises every supported buf.validate.string rule.
message Strings {
  string uuid     = 1 [(buf.validate.field).string.uuid = true];
  string email    = 2 [(buf.validate.field).string.email = true];
  string pat      = 3 [(buf.validate.field).string.pattern = "^[a-z]+$"];
  string ipv4     = 4 [(buf.validate.field).string.ipv4 = true];
  string ipv6     = 5 [(buf.validate.field).string.ipv6 = true];
  string hostname = 6 [(buf.validate.field).string.hostname = true];
  string uri      = 7 [(buf.validate.field).string.uri = true];
  string ranged   = 8 [(buf.validate.field).string = {
    min_len: 3
    max_len: 10
  }];
  string only_in  = 9 [(buf.validate.field).string = {
    in: ["alpha", "beta"]
  }];
}

// Numeric exercises every buf.validate numeric rule variant.
message Numeric {
  int32  i32_open   = 1 [(buf.validate.field).int32  = {gt: 0, lt: 100}];
  int32  i32_closed = 2 [(buf.validate.field).int32  = {gte: 0, lte: 100}];
  int32  i32_const  = 3 [(buf.validate.field).int32.const = 42];
  int32  i32_in     = 4 [(buf.validate.field).int32 = {in: [1, 2, 3]}];
  int64  i64_ranged = 5 [(buf.validate.field).int64  = {gte: 1, lte: 1000}];
  uint32 u32_ranged = 6 [(buf.validate.field).uint32 = {gte: 0, lte: 255}];
  uint64 u64_ranged = 7 [(buf.validate.field).uint64 = {gte: 1, lte: 9999999999}];
  float  f_closed   = 8 [(buf.validate.field).float  = {gte: 0.0, lte: 1.0}];
  double d_open     = 9 [(buf.validate.field).double = {gt: 0.0, lt: 1.0}];
}

// Listy exercises repeated-specific and item-level rules.
message Listy {
  repeated string tags = 1 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 5
    unique: true
  }];

  repeated string bounded_items = 2 [(buf.validate.field).repeated = {
    items: {
      string: {min_len: 2, max_len: 20}
    }
  }];

  repeated Scalars nested_messages = 3;
  repeated Status  statuses        = 4;
  repeated bytes   blobs           = 5;
}

// Mapy exercises proto maps with every supported key type and
// value-type combination, plus key/value constraint overlays.
message Mapy {
  map<string, int32>  counts = 1 [(buf.validate.field).map = {
    keys:   {string: {min_len: 1}}
    values: {int32:  {gte: 0}}
  }];

  map<int64, string>  by_id          = 2;
  map<int32, Scalars> by_i32         = 3;
  map<uint32, Status> by_u32_to_enum = 4;
  map<bool, string>   by_bool        = 5;
}

// Bytesy exercises buf.validate.bytes rules.
message Bytesy {
  bytes bounded   = 1 [(buf.validate.field).bytes = {min_len: 1, max_len: 1024}];
  bytes unbounded = 2;
}

// WellKnown exercises every google.protobuf.* well-known type.
message WellKnown {
  google.protobuf.Timestamp   ts       = 1;
  google.protobuf.Duration    dur      = 2;
  google.protobuf.Struct      obj      = 3;
  google.protobuf.Value       any_value = 4;
  google.protobuf.ListValue   lst      = 5;
  google.protobuf.FieldMask   mask     = 6;
  google.protobuf.Any         pkt      = 7;
  google.protobuf.Empty       empty    = 8;
  google.protobuf.StringValue sv       = 9;
  google.protobuf.Int32Value  i32v     = 10;
  google.protobuf.Int64Value  i64v     = 11;
  google.protobuf.UInt32Value u32v     = 12;
  google.protobuf.UInt64Value u64v     = 13;
  google.protobuf.BoolValue   bv       = 14;
  google.protobuf.DoubleValue dv       = 15;
  google.protobuf.FloatValue  fv       = 16;
  google.protobuf.BytesValue  bytesv   = 17;
}

// Oneofs exercises both real and synthetic (proto3 optional) oneofs,
// real oneofs with mixed scalar/message/enum members, and multiple
// real oneofs in the same message.
message Oneofs {
  oneof choice {
    string  text    = 1;
    int32   count   = 2;
    Scalars nested  = 3;
    Status  label   = 4;
  }

  oneof fallback {
    string  reason  = 5;
    bool    silent  = 6;
  }

  // Synthetic oneof — proto3 `optional` — renders as a regular optional field.
  optional string maybe_note = 7;
  // Multiple synthetic oneofs in the same message.
  optional int32  maybe_count = 8;
}

// Recursive tests the maxDepth cycle-breaker for direct recursion.
message Recursive {
  string name  = 1;
  Recursive child = 2;
}

// MutualA / MutualB tests the cycle-breaker for MUTUAL recursion
// (A → B → A → B → ...).
message MutualA {
  string  label = 1;
  MutualB peer  = 2;
}
message MutualB {
  string  label = 1;
  MutualA peer  = 2;
}

// Deep exercises multiple levels of nesting without cycles.
message Deep {
  message L1 {
    message L2 {
      message L3 {
        string leaf = 1;
      }
      L3 l3 = 1;
    }
    L2 l2 = 1;
  }
  L1 l1 = 1;
}
