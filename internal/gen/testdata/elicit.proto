syntax = "proto3";

// elicit.proto exercises the generator's elicitation-gate emission path.
// The single RPC carries both a tool and an elicitation annotation with a
// Mustache-templated message that references a request field, so the
// generated Go code must (a) build mcp.ElicitParams with the rendered
// message and (b) short-circuit with an IsError CallToolResult when the
// client does not return action=accept.
package protomcp.gen.testdata.elicit.v1;

import "protomcp/v1/annotations.proto";

option go_package = "github.com/gdsoumya/protomcp/internal/gen/testdata/elicit;elicitv1";

service Elicit {
  // Delete removes the named task. Annotated destructive, and gated on a
  // client-side confirmation prompt that echoes back the incoming id.
  rpc Delete(DeleteRequest) returns (DeleteReply) {
    option (protomcp.v1.tool) = {
      title: "Delete"
      idempotent: true
      destructive: true
    };
    option (protomcp.v1.elicitation) = {
      message: "Delete item with id {{id}}? This cannot be undone."
    };
  }
}

message DeleteRequest {
  string id = 1;
}

message DeleteReply {
  bool ok = 1;
}
